<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火星基地 · 趣味思维挑战场</title>
    <style>
        :root { --mars-red: #ff4500; --mars-orange: #ff7f50; --space-black: #0b090a; --neon-glow: #00ffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: linear-gradient(135deg, var(--space-black) 30%, #2b0f0d 100%); color: #f5f5f5; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px dashed var(--mars-red); padding-bottom: 15px; width: 100%; max-width: 800px; }
        h1 { color: var(--mars-orange); font-size: 2rem; text-shadow: 0 0 10px rgba(255, 69, 0, 0.5); }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; width: 100%; max-width: 800px; }
        .tab-btn { flex: 1; padding: 12px; background: rgba(255, 69, 0, 0.1); border: 1px solid var(--mars-red); color: #fff; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--mars-red); box-shadow: 0 0 15px var(--mars-red); }
        .progress-container { width: 100%; max-width: 800px; background: rgba(255,255,255,0.1); height: 10px; border-radius: 5px; margin-bottom: 20px; overflow: hidden; border: 1px solid rgba(255, 69, 0, 0.3); }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--mars-orange), var(--neon-glow)); transition: width 0.3s ease; }
        .quiz-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; margin-bottom: 50px; }
        .card { background: rgba(20, 15, 15, 0.8); border: 1px solid rgba(255, 127, 80, 0.3); border-left: 5px solid var(--mars-orange); border-radius: 8px; padding: 20px; }
        .card-header { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; }
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .option-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #ddd; padding: 12px; border-radius: 6px; cursor: pointer; text-align: left; }
        .option-btn.correct { background: #2e7d32 !important; border-color: #4caf50 !important; color: white; }
        .option-btn.wrong { background: #c62828 !important; border-color: #f44336 !important; color: white; }
        .result-text { font-weight: bold; margin-top: 10px; min-height: 20px; }
        .text-success { color: #4caf50; }
        .text-danger { color: #f44336; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        .overlay.show { opacity: 1; pointer-events: auto; }
        .reward-modal { background: #1c1a1a; border: 2px solid var(--neon-glow); border-radius: 15px; padding: 30px; text-align: center; max-width: 450px; width: 90%; }
        .reward-title { color: var(--neon-glow); font-size: 1.8rem; margin-bottom: 10px; }
        .close-reward-btn { background: linear-gradient(90deg, var(--mars-red), var(--mars-orange)); color: white; border: none; padding: 12px 30px; font-size: 1rem; font-weight: bold; border-radius: 25px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>火星探索者 · 思维空间站</h1>
    </header>
    <div class="nav-tabs">
        <button class="tab-btn active" id="tab-riddle" onclick="switchCategory('riddle')">☄️ 能量字谜</button>
        <button class="tab-btn" id="tab-brain" onclick="switchCategory('brain')">🚀 舱外急转弯</button>
        <button class="tab-btn" id="tab-idiom" onclick="switchCategory('idiom')">🛸 基地成语</button>
    </div>
    <div class="progress-container"><div id="progress" class="progress-bar"></div></div>
    <div id="quiz-box" class="quiz-container"></div>
    <div id="reward-overlay" class="overlay">
        <div class="reward-modal">
            <div style="font-size:4rem;">🏆</div>
            <div class="reward-title">你太棒了！</div>
            <div id="reward-text" style="color:#ddd; line-height:1.6;"></div>
            <button class="close-reward-btn" onclick="closeReward()">接收能量并继续</button>
        </div>
    </div>
    <script>
        const database = {
            riddle: [
                { q: "心里有一个大大的愿望，去掉底下的心，换成言字旁（讠）。", s: ["原谅", "愿望", "特别", "简单"], a: "原谅" },
                { q: "“原”字下面加一个“心”字。", s: ["愿望", "原谅", "时钟", "礼物"], a: "愿望" },
                { q: "反犬旁（犭）右边写一个“苗”字。", s: ["猫咪", "玩具", "蝌蚪", "胡子"], a: "猫咪" },
                { q: "“元”字加一横，后面放一个“具”字。", s: ["玩具", "环保袋", "棉花", "吸管"], a: "玩具" },
                { q: "左边是三点水（氵），右边是一个“巾”字。", s: ["毛巾", "瀑布", "手表", "牙刷"], a: "毛巾" },
                { q: "左边是“时”字，右边是“钟”字。", s: ["时钟", "手表", "彩虹", "礼物"], a: "时钟" },
                { q: "小蝌蚪，细尾巴，左边是三点水（氵），右边写个“科”。", s: ["蝌蚪", "猫咪", "瀑布", "简单"], a: "蝌蚪" },
                { q: "长在嘴巴周围、下巴上的毛。", s: ["胡子", "棉花", "毛巾", "特别"], a: "胡子" },
                { q: "植物长出的白白软软的壳，可以用来做棉被。", s: ["棉花", "玩具", "环保袋", "一束鲜花"], a: "棉花" },
                { q: "牛字旁（牜）加一个“寺”字。", s: ["特别", "奇怪", "简单", "愿望"], a: "特别" }
            ],
            brain: [
                { q: "去超市买东西不用塑料袋，用什么袋子最保护地球？", s: ["环保袋", "玩具", "毛巾", "吸管"], a: "环保袋" },
                { q: "每天早晚都要全身挤上白膏，在嘴巴里刷刷刷的是什么？", s: ["牙刷", "毛巾", "吸管", "时钟"], a: "牙刷" },
                { q: "下雨后天空中出现一条彩色的、像桥一样的东西，是什么？", s: ["彩虹", "瀑布", "灰色", "特别"], a: "彩虹" },
                { q: "水往低处流，从很高很高的大山上直直冲下来的大水叫什么？", s: ["瀑布", "彩虹", "吸管", "简单"], a: "瀑布" },
                { q: "过生日或者过圣诞节时，拆开包装纸才能看到的惊喜是什么？", s: ["礼物", "玩具", "一束鲜花", "愿望"], a: "礼物" },
                { q: "黑色的墨水和白色的牛奶混在一起，会变成什么颜色？", s: ["灰色", "奇怪", "特别", "棉花"], a: "灰色" },
                { q: "插在饮料杯里，用嘴轻轻一吸就能喝到奶茶的管子叫什么？", s: ["吸管", "牙刷", "毛巾", "玩具"], a: "吸管" },
                { q: "戴在手腕上，有长针 and 短针，天天滴答滴答帮你看时间的是什么？", s: ["手表", "时钟", "玩具", "礼物"], a: "手表" },
                { q: "饭菜没吃完就偷偷倒掉，本子没写几个字就扔掉，这种不爱惜的行为叫什么？", s: ["浪费", "简单", "奇怪", "半途而废"], a: "浪费" },
                { q: "放假了，爸爸妈妈带你坐飞机去北京或者去海边玩，这叫什么？", s: ["旅行", "跳舞", "愿望", "特别"], a: "旅行" }
            ],
            idiom: [
                { q: "一会想吃苹果，一会想吃西瓜，心思变来变去，可以用哪两个数字形容？", s: ["三心两意", "手忙脚乱", "狼吞虎咽", "半途而废"], a: "三心两意" },
                { q: "写作业写到一半就跑去玩了，没有坚持写完。", s: ["半途而废", "三心两意", "满头大汗", "手忙脚乱"], a: "半途而废" },
                { q: "肚子太饿了，吃起饭来像狼和老虎一样快。", s: ["狼吞虎咽", "手忙脚乱", "满头大汗", "愁眉苦脸"], a: "狼吞虎咽" },
                { q: "遇到难过、发愁的事，眉头锁在一起，脸拉得长长的。", s: ["愁眉苦脸", "满头大汗", "手忙脚乱", "奇怪"], a: "愁眉苦脸" },
                { q: "天气太热或者刚跑完800米，整个头上都是汗水。", s: ["满头大汗", "手忙脚乱", "愁眉苦脸", "跳舞"], a: "满头大汗" },
                { q: "事情太多太着急，手和脚都不知道该先动哪一个，乱成一团。", s: ["手忙脚乱", "满头大汗", "狼吞虎咽", "简单"], a: "手忙脚乱" },
                { q: "这个东西长得和普通的东西不一样，让人觉得很不平常、看不懂。", s: ["奇怪", "特别", "简单", "浪费"], a: "奇怪" },
                { q: "这道题一点都不难，一加一等于二非常（ ）。", s: ["简单", "特别", "奇怪", "愿望"], a: "简单" },
                { q: "听着欢快的音乐，身体跟着节奏快乐地跳跃、摆动。", s: ["跳舞", "旅行", "玩具", "特别"], a: "跳舞" },
                { q: "情人节或者母亲节时，爸爸送给妈妈一整把漂亮的红玫瑰。", s: ["一束鲜花", "礼物", "环保袋", "棉花"], a: "一束鲜花" }
            ]
        };
        let currentCategory = 'riddle'; let answeredCount = 0;
        function renderQuiz(category) {
            currentCategory = category; answeredCount = 0; updateProgressBar();
            const container = document.getElementById('quiz-box'); container.innerHTML = '';
            database[category].forEach((item, index) => {
                const card = document.createElement('div'); card.className = 'card';
                const header = document.createElement('div'); header.className = 'card-header';
                header.innerHTML = `<span style="background:#444;padding:2px 8px;border-radius:4px;font-size:0.8rem;color:var(--neon-glow);margin-right:10px;">TASK ${index + 1}</span> ${item.q}`;
                card.appendChild(header);
                const grid = document.createElement('div'); grid.className = 'options-grid';
                item.s.forEach(option => {
                    const btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = option;
                    btn.onclick = function() { checkAnswer(this, option, item.a, grid); };
                    grid.appendChild(btn);
                });
                card.appendChild(grid);
                const result = document.createElement('div'); result.className = 'result-text';
                card.appendChild(result); container.appendChild(card);
            });
        }
        function checkAnswer(selectedBtn, chosen, correct, gridElement) {
            const buttons = gridElement.querySelectorAll('.option-btn'); const resultText = gridElement.nextElementSibling;
            buttons.forEach(btn => btn.disabled = true);
            if (chosen === correct) {
                selectedBtn.classList.add('correct'); resultText.innerHTML = "🟢 能量匹配成功！答案正确。"; resultText.className = "result-text text-success";
            } else {
                selectedBtn.classList.add('wrong'); resultText.innerHTML = `🔴 修复码应该是【${correct}】`; resultText.className = "result-text text-danger";
                buttons.forEach(btn => { if (btn.innerText === correct) btn.classList.add('correct'); });
            }
            answeredCount++; updateProgressBar();
            if (answeredCount === 10) { setTimeout(showReward, 600); }
        }
        function updateProgressBar() { const percentage = (answeredCount / 10) * 100; document.getElementById('progress').style.width = percentage + '%'; }
        function showReward() {
            const messages = { riddle: "10道能量字谜全部破解完毕！<br>你成功为基地注入了满格能源 ⚡️", brain: "思维反应太快了！10道舱外急转弯全部通关！<br>你的智慧已经超越了火星重力 🚀", idiom: "成语知识库完美同步！10道基地成语全部答完！<br>你现在是超级火星指挥官了 🛸" };
